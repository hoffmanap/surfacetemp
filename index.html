<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso Micro-Climate Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        .info-box { 
            position: absolute; bottom: 20px; left: 20px; 
            background: white; padding: 15px; border-radius: 5px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2); z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="info-box">
        <h3>El Paso Micro-Climate</h3>
        <p>Hover over a grid section to see local surface temperatures.</p>
        <div id="temp-display">Temperature: --</div>
    </div>

    <div id="map"></div>

    <script>
        // Initialize the map focused over El Paso
        const map = L.map('map').setView([31.7619, -106.4850], 10);

        // Add a clean basemap so our data stands out
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Function to color-code grid cells dynamically based on heat intensity (in Celsius)
        function getColor(temp) {
            return temp > 45 ? '#800026' :
                   temp > 40 ? '#BD0026' :
                   temp > 35 ? '#E31A1C' :
                   temp > 30 ? '#FC4E2A' :
                   temp > 25 ? '#FD8D3C' :
                               '#FEB24C';
        }

        // Apply styles to each grid polygon block
        function styleFeature(feature) {
            return {
                fillColor: getColor(feature.properties.mean),
                weight: 1,
                opacity: 0.4,
                color: 'white',
                fillOpacity: 0.7
            };
        }

        // Fetch the granular file produced by Earth Engine
        fetch('ElPaso_Granular_LST_July2023.geojson')
            .then(res => res.json())
            .then(geojsonData => {
                L.geoJSON(geojsonData, {
                    style: styleFeature,
                    onEachFeature: function(feature, layer) {
                        // Create interactive hover states
                        layer.on({
                            mouseover: function(e) {
                                const temp = feature.properties.mean.toFixed(2);
                                document.getElementById('temp-display').innerHTML = `<b>Temperature:</b> ${temp} °C`;
                                layer.setStyle({ fillOpacity: 0.9, weight: 2 });
                            },
                            mouseout: function(e) {
                                document.getElementById('temp-display').innerHTML = "Temperature: --";
                                layer.setStyle({ fillOpacity: 0.7, weight: 1 });
                            }
                        });
                    }
                }).addTo(map);
            })
            .catch(err => console.error("Error parsing GeoJSON:", err));
    </script>
</body>
</html>
