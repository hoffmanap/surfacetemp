<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso High-Performance Climate Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100vw; height: 100vh; }
        
        /* Dashboard Control Box */
        .control-panel { 
            position: absolute; bottom: 30px; left: 30px; 
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; width: 340px;
        }
        .slider-container { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        input[type=range] { flex-grow: 1; cursor: pointer; }
        
        /* Legend Styling */
        .legend {
            line-height: 18px; color: #555; background: white; padding: 10px;
            border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3 style="margin: 0 0 5px 0;">El Paso Micro-Climate Timeline</h3>
        <p style="margin: 0 0 15px 0; font-size: 13px; color: #666;">Historical Landsat Surface Temperature</p>
        
        <div id="active-date" style="font-size: 22px; font-weight: bold; color: #bd0026;">Loading Data...</div>
        <div id="temp-display" style="font-size: 14px; color: #333; margin-top: 5px;">Hover over cells</div>
        
        <div class="slider-container">
            <input type="range" id="time-slider" min="0" max="0" value="0" disabled>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 1. Initialize the map over El Paso
        const map = L.map('map').setView([31.7619, -106.4850], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { 
            attribution: '&copy; OpenStreetMap' 
        }).addTo(map);

        const gridLayerGroup = L.layerGroup().addTo(map);
        
        // 2. Global Variables
        let gridGeometries = null;
        let indexedData = {}; // Stores temp by time_id and grid_id
        let uniqueTimestamps = [];
        let globalBreaks = [];

        // 3. Helper Functions
        function calculateQuantiles(values, numBands) {
            // This sorts the array from lowest to highest in place
            values.sort((a, b) => a - b);
            let quantiles = [];
            for (let i = 1; i < numBands; i++) {
                let index = Math.floor((values.length / numBands) * i);
                quantiles.push(values[index]);
            }
            return quantiles;
        }

        function getColor(temp, classBreaks) {
            if (temp === undefined || temp === null) return 'transparent';
            return temp > classBreaks[3] ? '#bd0026' :
                   temp > classBreaks[2] ? '#f03b20' :
                   temp > classBreaks[1] ? '#fd8d3c' :
                   temp > classBreaks[0] ? '#fecc5c' : '#ffffb2';
        }

        function formatTimeLabel(str) {
            const parts = str.split('-');
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            return `${months[parseInt(parts[1]) - 1]} ${parts[0]}`;
        }

        // 4. Map Display Update Function
        function updateMapDisplay(timeID) {
            gridLayerGroup.clearLayers();
            const currentMonthData = indexedData[timeID] || {};

            const subLayer = L.geoJSON(gridGeometries, {
                style: function(f) {
                    const cellID = f.properties.grid_id;
                    const temp = currentMonthData[cellID];
                    return {
                        fillColor: getColor(temp, globalBreaks),
                        weight: 0.3, 
                        opacity: temp ? 0.1 : 0, 
                        color: 'white', 
                        fillOpacity: temp ? 0.75 : 0
                    };
                },
                onEachFeature: function(feature, layer) {
                    const cellID = feature.properties.grid_id;
                    const temp = currentMonthData[cellID];
                    if (!temp) return;

                    layer.on({
                        mouseover: function() {
                            document.getElementById('temp-display').innerHTML = `<b>Local Temp:</b> ${temp.toFixed(1)} °F`;
                            layer.setStyle({ fillOpacity: 0.95, weight: 1.5, color: '#333' });
                        },
                        mouseout: function() {
                            document.getElementById('temp-display').innerHTML = "Hover over cells";
                            subLayer.resetStyle(layer);
                        }
                    });
                }
            });

            gridLayerGroup.addLayer(subLayer);
            document.getElementById('active-date').innerText = formatTimeLabel(timeID);
        }

        // 5. Main Execution: Fetch Geometry and Data in Parallel
        Promise.all([
            fetch('ElPaso_Grid_Geometry.geojson').then(res => res.json()),
            fetch('ElPaso_LST_Metrics_Table.geojson').then(res => res.json())
        ]).then(([geojsonData, tableData]) => {
            gridGeometries = geojsonData;
            
            const timeSet = new Set();
            const allTemps = [];

            // Robust Parser: Detects if the data is a GeoJSON FeatureCollection or standard JSON array
            let records = [];
            if (tableData.features) {
                records = tableData.features.map(f => f.properties);
            } else if (Array.isArray(tableData)) {
                records = tableData;
            }

            // Index data table records for efficient lookup
            records.forEach(row => {
                const tID = row.t_id || row.time_id;
                const gID = row.g_id || row.grid_id;
                const temp = row.temp !== undefined ? row.temp : row.mean;

                if (tID && gID && temp !== null && !isNaN(temp)) {
                    timeSet.add(tID);
                    allTemps.push(temp);

                    if (!indexedData[tID]) indexedData[tID] = {};
                    indexedData[tID][gID] = temp;
                }
            });

            uniqueTimestamps = Array.from(timeSet).sort();
            
            // This function inherently sorts the allTemps array from lowest to highest
            globalBreaks = calculateQuantiles(allTemps, 5); 

            // Configure Slider
            const slider = document.getElementById('time-slider');
            slider.max = uniqueTimestamps.length - 1;
            slider.value = 0;
            slider.disabled = false;

            // Load initial map
            if (uniqueTimestamps.length > 0) {
                updateMapDisplay(uniqueTimestamps[0]);
            } else {
                document.getElementById('active-date').innerText = "No data found.";
            }

            // Listen for slider changes
            slider.addEventListener('input', function(e) {
                updateMapDisplay(uniqueTimestamps[parseInt(e.target.value)]);
            });

            // Render Legend (FIXED: Avoiding call stack overflow by using array index instead of Math.min/max)
            const legend = L.control({position: 'topright'});
            legend.onAdd = function () {
                const div = L.DomUtil.create('div', 'legend');
                
                // Since calculateQuantiles already sorted allTemps, we just grab the first and last items!
                const minTemp = allTemps[0];
                const maxTemp = allTemps[allTemps.length - 1];
                
                const limits = [minTemp, ...globalBreaks];
                
                div.innerHTML = '<b style="display:block; margin-bottom:5px;">Temp Range (°F)</b>';
                for (let i = 0; i < limits.length; i++) {
                    let from = limits[i].toFixed(1);
                    let to = limits[i+1] ? limits[i+1].toFixed(1) : maxTemp.toFixed(1);
                    div.innerHTML += `<i style="background:${getColor(limits[i]+0.1, globalBreaks)}"></i> ${from} &ndash; ${to}<br>`;
                }
                return div;
            };
            legend.addTo(map);
            
        }).catch(err => {
            console.error("Initialization error:", err);
            document.getElementById('active-date').innerText = "Load failed. Check GitHub build status.";
        });
    </script>
</body>
</html>
