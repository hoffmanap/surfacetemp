<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso Time-Series Climate Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { width: 100vw; height: 100vh; }
        
        /* Dashboard Control Box */
        .control-panel { 
            position: absolute; bottom: 30px; left: 30px; 
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; width: 320px;
        }
        .slider-container { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        input[type=range] { flex-grow: 1; cursor: pointer; }
        
        .legend {
            line-height: 18px; color: #555; background: white; padding: 10px;
            border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3 style="margin: 0 0 5px 0;">El Paso Micro-Climates</h3>
        <p style="margin: 0 0 15px 0; font-size: 13px; color: #666;">Drag slider to change months</p>
        
        <div id="active-date" style="font-size: 20px; font-weight: bold; color: #bd0026;">Loading Data...</div>
        <div id="temp-display" style="font-size: 14px; color: #333; margin-top: 5px;">Hover over cells for temperature</div>
        
        <div class="slider-container">
            <span>June</span>
            <input type="range" id="time-slider" min="0" max="2" value="0" disabled>
            <span>Aug</span>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([31.7619, -106.4850], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

        // Timeline mapping configuration
        const timeSteps = ["2023-06", "2023-07", "2023-08"];
        const monthsDisplay = ["June 2023", "July 2023", "August 2023"];
        
        let geoJsonLayer;
        let globalBreaks = [];

        function calculateQuantiles(values, numBands) {
            values.sort((a, b) => a - b);
            let quantiles = [];
            for (let i = 1; i < numBands; i++) {
                let index = Math.floor((values.length / numBands) * i);
                quantiles.push(values[index]);
            }
            return quantiles;
        }

        function getColor(temp, classBreaks) {
            return temp > classBreaks[3] ? '#bd0026' :
                   temp > classBreaks[2] ? '#f03b20' :
                   temp > classBreaks[1] ? '#fd8d3c' :
                   temp > classBreaks[0] ? '#fecc5c' : '#ffffb2';
        }

        // Main execution data load
        fetch('ElPaso_MultiMonth_LST_2023.geojson')
            .then(res => res.json())
            .then(geojsonData => {
                
                // 1. Compute baseline statistical breaks using ALL data points from ALL months
                const allTemps = geojsonData.features.map(f => f.properties.mean).filter(v => v !== null && !isNaN(v));
                globalBreaks = calculateQuantiles(allTemps, 5);

                // 2. Initialize the GeoJson Layer structure onto map
                geoJsonLayer = L.geoJSON(geojsonData, {
                    style: function(feature) {
                        return {
                            fillColor: getColor(feature.properties.mean, globalBreaks),
                            weight: 0.3, opacity: 0.1, color: 'white', fillOpacity: 0.75
                        };
                    },
                    filter: function(feature) {
                        // Crucial baseline filtering: map only active timeframe step features first
                        return feature.properties.time_id === timeSteps[0];
                    },
                    onEachFeature: function(feature, layer) {
                        layer.on({
                            mouseover: function() {
                                document.getElementById('temp-display').innerHTML = `<b>Local Temp:</b> ${feature.properties.mean.toFixed(1)} °F`;
                                layer.setStyle({ fillOpacity: 0.95, weight: 1.5, color: '#333' });
                            },
                            mouseout: function() {
                                document.getElementById('temp-display').innerHTML = "Hover over cells for temperature";
                                geoJsonLayer.resetStyle(layer);
                            }
                        });
                    }
                }).addTo(map);

                // 3. Unlock slider and ready UI panel
                const slider = document.getElementById('time-slider');
                slider.disabled = false;
                document.getElementById('active-date').innerText = monthsDisplay[0];

                // 4. Implement Time Slider interactive logic
                slider.addEventListener('input', function(e) {
                    const selectedIndex = parseInt(e.target.value);
                    const targetTimeID = timeSteps[selectedIndex];
                    
                    // Update Label Text
                    document.getElementById('active-date').innerText = monthsDisplay[selectedIndex];
                    
                    // Trigger dynamic layer re-filter swap on map
                    geoJsonLayer.clearLayers();
                    geoJsonLayer.addData(geojsonData);
                });

                // 5. Append Static Constant Scale Legend
                const legend = L.control({position: 'topright'});
                legend.onAdd = function () {
                    const div = L.DomUtil.create('div', 'legend');
                    const limits = [Math.min(...allTemps), ...globalBreaks];
                    div.innerHTML = '<b style="display:block; margin-bottom:5px;">Temp Range (°F)</b>';
                    for (let i = 0; i < limits.length; i++) {
                        let from = limits[i].toFixed(1);
                        let to = limits[i+1] ? limits[i+1].toFixed(1) : Math.max(...allTemps).toFixed(1);
                        div.innerHTML += `<i style="background:${getColor(limits[i]+0.1, globalBreaks)}"></i> ${from} &ndash; ${to}<br>`;
                    }
                    return div;
                };
                legend.addTo(map);
            })
            .catch(err => console.error("Error building time series application mapping layers:", err));
    </script>
</body>
</html>
